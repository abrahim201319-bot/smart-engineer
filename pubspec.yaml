name: smart_engineer
description: "مهندس ذكي - تطبيق مساعد للمهندس المدني في الموقع"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  camera: ^0.11.0+2
  image: ^4.2.0
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.3
  share_plus: ^10.0.2
  intl: ^0.19.0
  provider: ^6.1.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
